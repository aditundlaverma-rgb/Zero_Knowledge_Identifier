<!DOCTYPE html>
<html>
<head>
    <title>Zero-Knowledge Login - FIXED</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; }
        .hidden { display: none; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f4f4f4; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <h2>🔐 Zero-Knowledge Login - WORKING!</h2>
    
    <div id="loginForm">
        <input type="text" id="username" placeholder="Username" value="test">
        <input type="password" id="password" placeholder="Password" value="123456">
        <button onclick="registerUser()">Register</button>
        <button onclick="loginUser()">Login</button>
    </div>

    <div id="dashboard" class="hidden">
        <div class="status success">✅ Logged in as <span id="userDisplay"></span></div>
        <button onclick="logout()">Logout</button>
    </div>

    <div id="debug" style="margin-top: 20px;">
        <h4>Debug (F12 Console for details):</h4>
        <pre id="debugInfo"></pre>
    </div>

    <script src="app.js"></script>
</body>
</html>
